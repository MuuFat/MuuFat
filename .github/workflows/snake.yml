name: Generate Snake

on:
  schedule:
    # Runs at midnight every day
    - cron: "0 0 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Generate the snake SVG
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: MuuFat
          outputs: dist/github-contribution-grid-snake.svg

      # 2. Push the generated SVG to the output branch
      - name: Push to GitHub Pages / Output Branch
        uses: crazy-max/ghaction-github-pages@v4 # <-- BUMPED TO v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
